# cijoe config for the vfu_kvssd QEMU bring-up.
#
# Runs inside the nosi ubuntu-2604-docker image (QEMU 10.2 + cijoe ready), which
# provides the vfio-user client. Attaches the vfu_kvssd device over vfio-user
# and runs the xNVMe KV tests against the emulated KV namespace from the guest.

# SSH transport into the guest (paramiko); the guest forwards :22 to host :4200.
# NOTE: cijoe's `cijoe.run()` defaults to the first transport defined here, so
# host-side library steps that don't take a transport would target this. We
# avoid that: host steps use `transport: initiator` (local) or run_local, and
# this transport is used only for the guest.
[cijoe.transport.ssh]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

[os]
name = "ubuntu"
version = "26.04"

[build.compiler]
bin = "gcc"

[qemu]
img_bin = "qemu-img"
default_guest = "kvssd_amd64"

[qemu.systems.x86_64]
# QEMU >= 10.1 (here 10.2 from the nosi image) for the vfio-user client.
bin = "qemu-system-x86_64"

[qemu.guests.kvssd_amd64]
path = "{{ local.env.HOME }}/guests/kvssd-amd64"
system_label = "x86_64"

# No '-m': guest RAM is provided by the shareable memfd backend that
# vfu_kvssd_start.py injects (size from [kvssd].memory).
system_args.kwa = {cpu = "host", smp = 4, accel = "kvm"}

# Forward guest :22 to host :4200 for the SSH transport above.
system_args.tcp_forward = {host = 4200, guest = 22}

# Guest disk: nosi ubuntu-2604-headless (qemu+cijoe+devbind/iommu/hugepages
# preinstalled), an oras disk-image artifact pinned to the resolved blob digest
# for reproducibility. The workflow fetches + gunzips it to the guest boot.img.
[guest_image]
registry = "ghcr.io"
repository = "safl/nosi/ubuntu-2604-headless"
digest = "sha256:919e85401b034921ebcea8e167e1fe744929ffd9a7aedf6b3ba60694bba2723d"

# The device under test. cijoe runs from the cijoe/ dir, so 'binary' is given
# relative to that (one level up to the repo root, where zig emits it).
[kvssd]
binary = "../zig-out/bin/vfu_kvssd"
socket = "/tmp/vfu_kvssd.sock"
memory = "4G"
# cloud-init seed (label cidata) enabling root SSH on first boot; staged by
# the workflow alongside the guest's boot.img.
seed = "{{ local.env.HOME }}/guests/kvssd-amd64/seed.iso"
