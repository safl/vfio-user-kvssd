---
doc: |
  vfu_kvssd KV tests
  ==================

  Run xNVMe's KV I/O test against the emulated KV namespace via three access
  paths, in the guest the 'provision' task left running. Re-runnable on its own.

  1. kernel ioctl   -- /dev/ng0n1 (default sync/admin=nvme)
  2. io_uring_cmd   -- async kernel passthru (--be io_uring_cmd)
  3. upcie          -- userspace driver (--be upcie): device bound to
                       uio_pci_generic, hugepages reserved

steps:
- name: kv_test
  uses: core.cmdrunner
  with:
    transport: ssh
    commands:
    - "sudo kvs enum"
    - "sudo kvs idfy-ns /dev/ng0n1 --nsid 1"
    # 1. kernel ioctl
    - "sudo xnvme_tests_kvs kvs_io /dev/ng0n1 --dev-nsid 1"
    # 2. io_uring_cmd (async kernel passthru; needs liburing)
    - "sudo xnvme_tests_kvs kvs_io /dev/ng0n1 --dev-nsid 1 --be io_uring_cmd"
    # 3. upcie userspace backend: reserve hugepages, bind the controller to
    #    uio_pci_generic, run on the PCIe BDF, then restore the kernel driver.
    - |
      set -eu
      bdf=$(lspci -d 1d1d:1f1f -D | awk '{print $1}')
      echo "device: $bdf"
      sudo sysctl -w vm.nr_hugepages=512
      sudo modprobe uio_pci_generic || true
      trap 'sudo devbind --bind nvme --device "$bdf" || true' EXIT
      sudo devbind --bind uio_pci_generic --device "$bdf"
      sudo xnvme_tests_kvs kvs_io "$bdf" --dev-nsid 1 --be upcie
    - "lspci -nn"
