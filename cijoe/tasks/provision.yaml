doc: |
  vfu_kvssd provisioning
  ======================

  Build the device, boot a guest attached to it over vfio-user, and build
  xNVMe inside the guest. Leaves the guest + device running for the 'test'
  task -- there is no teardown: the CI container is ephemeral and discarded
  when the job ends.

  Runs in the nosi ubuntu-2604-docker image (QEMU 10.2 + cijoe). The guest's
  boot.img + cloud-init seed are staged by the workflow.

steps:
- name: build_kvssd
  uses: core.cmdrunner
  with:
    transport: initiator
    commands:
    # cijoe runs from cijoe/; build at the repo root (one level up).
    - "cd .. && zig build -Dtarget=x86_64-linux-musl -Dstatic=true -Doptimize=ReleaseSafe && file zig-out/bin/vfu_kvssd"

- name: start
  # Starts the vfu_kvssd server and boots the guest (boot.img staged by the
  # workflow) with the vfio-user device + shareable memfd backend. Both the
  # device (setsid) and the guest (-daemonize) outlive this cijoe invocation,
  # so the 'test' task can connect to them.
  uses: vfu_kvssd_start
  with:
    guest_name: kvssd_amd64

- name: wait_for_guest_ssh
  uses: core.wait_for_transport
  with:
    state: up
    transport_name: ssh
    # First boot runs cloud-init (host-key gen, SSH enable) on top of the
    # ~120s nested-KVM boot; 600s is a comfortable ceiling.
    timeout: 600

- name: verify_device
  # Quick verification that the vfio-user device enumerated, before the heavier
  # xNVMe build. The emulated controller is vendor 1d1d:1f1f (NVMe class).
  uses: core.cmdrunner
  with:
    transport: ssh
    commands:
    - "cloud-init status --wait || true"
    - "uname -a"
    - "apt-get update && apt-get install -y --no-install-recommends pciutils nvme-cli git"
    - "lspci -nn"
    - "lspci -d 1d1d:1f1f -nn | grep -qi . || { echo 'ERROR: vfu_kvssd not on PCI bus'; exit 1; }"
    # KV namespace shows up as a generic char device (not a block device).
    - "ls -l /dev/ng* /dev/nvme* 2>&1 || true"
    - "nvme list || true"

- name: build_xnvme
  uses: core.cmdrunner
  with:
    transport: ssh
    commands:
    - "git clone --recursive --depth 1 https://github.com/xnvme/xnvme.git"
    # xNVMe's own dependency script (installs build deps + libvfn).
    - "cd xnvme && ./toolbox/pkgs/debian-trixie.sh"
    # Slim build (kernel /dev/ng ioctl backend only: no SPDK/liburing/libvfn/
    # libaio/isal). 'clean' ensures a fresh builddir for 'config-slim'.
    - "cd xnvme && make clean config-slim build install && ldconfig"
