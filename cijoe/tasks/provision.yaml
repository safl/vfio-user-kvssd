doc: |
  vfu_kvssd provisioning
  ======================

  Build the device, boot the nosi ubuntu-2604 guest attached to it over
  vfio-user, build xNVMe in the guest, then env-check the device: enumeration
  (lspci) and a driver attach/detach cycle (devbind). Leaves the guest +
  device running for the 'test' task -- no teardown: the CI container is
  ephemeral.

  Runs in the nosi ubuntu-2604-docker image (QEMU 10.2 + cijoe). The guest's
  boot.img + cloud-init seed are staged by the workflow. The guest is a nosi
  image too, so devbind / iommu / hugepages are preinstalled.

steps:
- name: build_kvssd
  uses: core.cmdrunner
  with:
    transport: initiator
    commands:
    # cijoe runs from cijoe/; build at the repo root (one level up).
    - "cd .. && zig build -Dtarget=x86_64-linux-musl -Dstatic=true -Doptimize=ReleaseSafe && file zig-out/bin/vfu_kvssd"

- name: start
  # Starts the vfu_kvssd server and boots the guest with the vfio-user device
  # + shareable memfd backend. Both the device (setsid) and the guest
  # (-daemonize) outlive this cijoe invocation, so 'test' can connect to them.
  uses: vfu_kvssd_start
  with:
    guest_name: kvssd_amd64

- name: wait_for_guest_ssh
  uses: core.wait_for_transport
  with:
    state: up
    transport_name: ssh
    timeout: 600

- name: build_xnvme
  uses: core.cmdrunner
  with:
    transport: ssh
    commands:
    - "sudo cloud-init status --wait || true"
    - "uname -a"
    - "git clone --recursive --depth 1 https://github.com/xnvme/xnvme.git"
    # Dependency install for the guest distro (Ubuntu 26.04 ~ questing).
    - "cd xnvme && sudo ./toolbox/pkgs/ubuntu-questing.sh"
    # Build with liburing (for io_uring_cmd) + the in-tree upcie backend;
    # SPDK and libvfn disabled. (upcie lives in lib/upcie, built when be_upcie.)
    - "cd xnvme && meson setup builddir -Dwith-liburing=enabled -Dwith-spdk=disabled -Dwith-libvfn=disabled && meson compile -C builddir && sudo meson install -C builddir && sudo ldconfig"

- name: env_check
  # Verify the controller (vendor 1d1d:1f1f) enumerated, then a driver
  # attach/detach cycle with devbind (preinstalled in the nosi guest): detach
  # binds it to uio_pci_generic so /dev/ng0n1 disappears; re-bind nvme brings
  # it back -- confirming the device survives controller disable/re-enable.
  uses: core.cmdrunner
  with:
    transport: ssh
    commands:
    - "lspci -nn"
    - "lspci -d 1d1d:1f1f -nn | grep -qi . || { echo 'ERROR: vfu_kvssd not on PCI bus'; exit 1; }"
    - "sudo nvme list || true"
    - "ls -l /dev/ng0n1"
    - "sudo devbind --list"
    - |
      set -eu
      bdf=$(lspci -d 1d1d:1f1f -D | awk '{print $1}')
      echo "device: $bdf"
      sudo modprobe uio_pci_generic || true
      echo "## detach: bind $bdf -> uio_pci_generic"
      sudo devbind --bind uio_pci_generic --device "$bdf"
      for i in $(seq 1 30); do [ -e /dev/ng0n1 ] || break; sleep 0.5; done
      if [ -e /dev/ng0n1 ]; then echo "ERROR: still attached after detach"; exit 1; fi
      echo "OK detached: /dev/ng0n1 gone"
      echo "## re-attach: bind $bdf -> nvme"
      sudo devbind --bind nvme --device "$bdf"
      for i in $(seq 1 30); do [ -e /dev/ng0n1 ] && break; sleep 0.5; done
      if [ ! -e /dev/ng0n1 ]; then echo "ERROR: did not re-attach"; exit 1; fi
      echo "OK re-attached: /dev/ng0n1 back"
