name: release

# Build the static, dependency-free vfu_kvssd binary for x86_64 and aarch64
# (Zig cross-compiles both from one runner) and publish them to a GitHub
# release. Triggered by pushing a version tag, e.g. `git tag v0.1.0 && git push --tags`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  ZIG_VERSION: "0.16.0"

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig ${{ env.ZIG_VERSION }}
        run: |
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
          mkdir -p /opt/zig
          tar -C /opt/zig --strip-components=1 -xf /tmp/zig.tar.xz
          echo "/opt/zig" >> "$GITHUB_PATH"

      - name: Build static binaries (x86_64 + aarch64)
        run: |
          set -eu
          mkdir -p dist
          for tgt in x86_64-linux-musl aarch64-linux-musl; do
            arch=${tgt%%-*}
            zig build -Dtarget="$tgt" -Dstatic=true -Doptimize=ReleaseSafe
            out="dist/vfu_kvssd-${arch}-linux"
            cp zig-out/bin/vfu_kvssd "$out"
            file "$out"
            # Sanity: must be statically linked.
            file "$out" | grep -q "statically linked" || { echo "ERROR: $out not static"; exit 1; }
          done
          (cd dist && sha256sum vfu_kvssd-* > SHA256SUMS)
          ls -lh dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/vfu_kvssd-x86_64-linux
            dist/vfu_kvssd-aarch64-linux
            dist/SHA256SUMS
